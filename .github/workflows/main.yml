name: Build/release

on: push

jobs:
    release:
        runs-on: ${{ matrix.os }}
        env:
            EVS_USERNAME: ${{ secrets.EVS_USERNAME }}
            EVS_PASSWORD: ${{ secrets.EVS_PASSWORD }}
            STRICT_VMP_SIGNING: true

        strategy:
            matrix:
                os: [macos-latest, windows-latest]

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'pnpm'

            - name: Install Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install EVS client
              run: python -m pip install castlabs_evs

            - name: Authenticate EVS (non-interactive)
              run: python scripts/evs-auth.py

            - name: Install dependencies
              run: pnpm install

            - name: Run tests
              run: pnpm test

            - name: Check code formatting with Prettier
              run: pnpm prettier --check .

            - name: Build/release Electron app
              uses: actions-marketplace-validations/njzydark_action-electron-builder-pnpm@pnpm
              with:
                  github_token: ${{ secrets.github_token }}
                  package_manager: 'pnpm'
                  release: ${{ startsWith(github.ref, 'refs/tags/v') }}
              env:
                  EVS_USERNAME: ${{ env.EVS_USERNAME }}
                  EVS_PASSWORD: ${{ env.EVS_PASSWORD }}
                  STRICT_VMP_SIGNING: ${{ env.STRICT_VMP_SIGNING }}
